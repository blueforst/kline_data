[tool:pytest]
# Performance testing configuration

# Test discovery
testpaths = tests/performance
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Performance testing specific settings
addopts =
    --benchmark-only
    --benchmark-sort=mean
    --benchmark-warmup=on
    --benchmark-min-rounds=3
    --benchmark-max-time=60.0
    --benchmark-timer=auto
    --benchmark-disable-gc
    --benchmark-only
    --verbose
    --tb=short

# Performance test markers
markers =
    performance: marks tests as performance tests
    benchmark: marks tests as benchmark tests
    memory: marks tests as memory usage tests
    stress: marks tests as stress tests
    concurrent: marks tests as concurrent tests
    regression: marks tests as regression tests

# Minimum version requirements
minversion = 6.0

# Test output
console_output_style = progress
addopts += --capture=fd
addopts += --capture=sys
addopts += --capture=no

# Timeout settings
timeout = 300
timeout_method = thread

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Performance analysis
addopts += --benchmark-json=benchmark_results.json

# Coverage settings (when used with --cov)
addopts = --cov=../.. --cov-report=html --cov-report=term-missing
addopts += --cov-report=html --cov-report=xml --cov-report=term-missing

# Group settings
addopts = --benchmark-group-by=benchmark