[tool:pytest]
# 测试路径和模式
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试发现
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=85
    --durations=10
    --disable-warnings

# 最小版本要求
minversion = 7.0

# 测试标记
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (medium speed)
    performance: Performance tests (slow)
    security: Security tests
    slow: Slow running tests
    benchmark: Benchmark tests
    network: Tests that require network access
    database: Tests that require database
    ccxt: Tests that use CCXT library
    async: Async tests
    memory: Memory-intensive tests
    cli: CLI tests
    api: API tests
    indicators: Technical indicators tests
    storage: Storage layer tests
    reader: Data reader tests
    config: Configuration tests
    utils: Utility function tests

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:polars.*
    ignore::UserWarning:pandas.*

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 异步测试配置
asyncio_mode = auto

# 并行测试配置
# 使用 pytest-xdist 进行并行测试
# 命令行: pytest -n auto

# 性能测试配置
# 使用 pytest-benchmark
# 命令行: pytest --benchmark-only

# 覆盖率配置
[coverage:run]
source = .
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    */site-packages/*
    setup.py
    */migrations/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
    # 不覆盖类型检查代码
    : typing\.TYPE_CHECKING

# 覆盖率阈值
[coverage:fail_under]
fail_under = 85