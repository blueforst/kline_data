# K线数据存储系统配置文件

# 基础配置
system:
  version: "1.0.0"
  log_level: "INFO"
  log_path: "./logs"

# 存储配置
storage:
  # 数据根目录
  root_path: "/Volumes/sandisk/kline_data"
  # 按交易所分离
  separate_by_exchange: true
  # 按交易对分离
  separate_by_symbol: true
  # 数据格式
  format: "parquet"
  # 压缩算法: snappy, gzip, brotli, lz4, zstd
  compression: "snappy"
  # 分区策略
  partition:
    enabled: true
    # 按年月分区: year, month, day
    granularity: "month"
  # 数据保留策略
  retention:
    enabled: false
    days: 365

# CCXT配置
ccxt:
  # 网络代理
  proxy:
    http: "http://127.0.0.1:7890"
    https: "http://127.0.0.1:7890"
  # API限流
  rate_limit:
    enabled: true
    requests_per_minute: 1200
  # 重试策略
  retry:
    max_attempts: 3
    backoff_factor: 2
    timeout: 30
  # 支持的交易所
  exchanges:
    - binance
    - okx
    - bybit

# 内存管理
memory:
  # 最大内存使用 (MB)
  max_usage_mb: 1024
  # 数据块大小
  chunk_size: 100000
  # 缓存配置
  cache:
    enabled: true
    max_size_mb: 512
    ttl_seconds: 3600

# 指标配置
indicators:
  # 默认参数
  defaults:
    ma_periods: [5, 10, 20, 50, 200]
    ema_periods: [12, 26]
    boll_period: 20
    boll_std: 2
    rsi_period: 14
    macd: [12, 26, 9]
  # 批量计算
  batch_compute: true

# API服务配置
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  # 认证
  auth:
    enabled: false
    api_key: ""
  # 限流
  rate_limit:
    enabled: true
    requests_per_minute: 1000
  # CORS
  cors:
    enabled: true
    origins: ["*"]

# CLI配置
cli:
  # 默认交易所
  default_exchange: "binance"
  # 默认交易对
  default_symbol: "BTC/USDT"
  # 输出格式
  output_format: "table"  # table, json, csv
